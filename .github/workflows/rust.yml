name: Rust

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/checkout@v6
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool libsixel-dev
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy -- -D warnings
      - name: Run tests
        run: cargo test

  build-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool libsixel-dev

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool libsixel

      - name: Check compilation
        run: cargo check

  build-and-deploy:
    needs: [check-and-test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            TARGET: x86_64-apple-darwin
            CROSS: false

          - os: macos-latest
            TARGET: aarch64-apple-darwin
            CROSS: false

          - os: ubuntu-latest
            TARGET: x86_64-unknown-linux-musl
            CROSS: true
            CROSS_ARGS: ""

          - os: ubuntu-latest
            TARGET: aarch64-unknown-linux-musl
            CROSS: true
            CROSS_ARGS: ""

          - os: windows-latest
            TARGET: x86_64-pc-windows-msvc
            CROSS: true
            CROSS_ARGS: ""
            EXTENSION: .exe

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools (macOS)
        if: ${{ ! matrix.CROSS && runner.os == 'macOS' }}
        run: brew install autoconf automake libtool libsixel

      - name: Setup Rust (native)
        if: ${{ ! matrix.CROSS }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.TARGET }}

      - name: Build binary (native)
        if: ${{ ! matrix.CROSS }}
        run: cargo build --release --target ${{ matrix.TARGET }}

      - name: Install build tools (Linux cross)
        if: ${{ matrix.CROSS && runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool libsixel-dev

      - name: Build binary (cross)
        if: ${{ matrix.CROSS }}
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.TARGET }}
          args: "--release ${{ matrix.CROSS_ARGS }}"

      - name: Archive binary
        shell: bash
        run: |
          BIN="viua-${{ matrix.TARGET }}${{ matrix.EXTENSION }}"
          cp "target/${{ matrix.TARGET }}/release/viua${{ matrix.EXTENSION }}" "$BIN"
          echo "artifact=$BIN" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact }}
          path: ${{ env.artifact }}

      - uses: softprops/action-gh-release@v2
        name: Upload binaries to release
        with:
          files: ${{ env.artifact }}
